name: 24-7 Stream Heartbeat

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours
  workflow_dispatch:        # Manual run button

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Poke Hugging Face Spaces
        run: |
          echo "Pinging lofi-radio..."
          curl -Is https://captain-exe-lofi-radio.hf.space/ | head -n 1

          echo "Pinging forever-ping..."
          curl -Is https://captain-exe-forever-ping.hf.space/ | head -n 1
